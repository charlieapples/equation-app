<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Equation Builder</title>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:40px;
}

input{
font-size:18px;
padding:8px;
margin:6px;
}

button{
font-size:18px;
padding:8px 15px;
margin:10px;
}

#savedEquations{
margin-top:30px;
}

</style>

</head>

<body>

<h1>Equation Builder</h1>

<p>Write equation using x</p>

<input id="equation" placeholder="Example: 3*x+4">

<br>

<input id="xvalue" type="number" placeholder="x value">

<br>

<button onclick="calculate()">Calculate</button>
<button onclick="saveEquation()">Save Equation</button>

<h2 id="result"></h2>

<div id="savedEquations"></div>

<script>

let equations = JSON.parse(localStorage.getItem("equations")) || [];

function calculate(){

let eq = document.getElementById("equation").value;

let x = Number(document.getElementById("xvalue").value);

let result = eval(eq.replaceAll("x",x));

document.getElementById("result").innerText = result;

}

function saveEquation(){

let eq = document.getElementById("equation").value;

equations.push(eq);

localStorage.setItem("equations",JSON.stringify(equations));

displayEquations();

}

function displayEquations(){

let div = document.getElementById("savedEquations");

div.innerHTML = "<h3>Saved Equations</h3>";

equations.forEach(e=>{
div.innerHTML += `<p>${e}</p>`;
});

}

displayEquations();

</script>

</body>
</html>
